<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f1a2e"/>
      <stop offset="100%" stop-color="#1a1020"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8c4a0"/>
      <stop offset="100%" stop-color="#c4986c"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="40%">
      <stop offset="0%" stop-color="rgba(212,165,116,0.15)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <rect width="512" height="512" rx="108" fill="url(#glow)"/>
  <!-- Decorative circle (timer hint) -->
  <circle cx="256" cy="240" r="120" fill="none" stroke="rgba(212,165,116,0.12)" stroke-width="2"/>
  <circle cx="256" cy="240" r="120" fill="none" stroke="url(#gold)" stroke-width="2.5" stroke-dasharray="565 190" stroke-dashoffset="-40" stroke-linecap="round"/>
  <!-- 音凪 text -->
  <text x="256" y="258" text-anchor="middle" font-family="serif" font-size="108" font-weight="400" fill="url(#gold)" letter-spacing="12">音凪</text>
  <!-- Subtitle -->
  <text x="256" y="400" text-anchor="middle" font-family="sans-serif" font-size="28" font-weight="300" fill="rgba(232,196,160,0.55)" letter-spacing="8">OTONAGI</text>
</svg>
